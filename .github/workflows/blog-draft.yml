name: Generate Blog Draft

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9am UTC
  workflow_dispatch: {}   # Allow manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate blog draft
        uses: actions/github-script@v7
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_DB_ID: '33388a120cc88069aba2fff072cc8b3d'
        with:
          script: |
            const fs = require('fs');

            // Load content calendar
            const calendar = JSON.parse(fs.readFileSync('scripts/content-calendar.json', 'utf-8'));

            // Get existing posts from Notion to find next unwritten brief
            const notionRes = await fetch(`https://api.notion.com/v1/databases/${process.env.NOTION_DB_ID}/query`, {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${process.env.NOTION_API_KEY}`,
                'Notion-Version': '2022-06-28',
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({ page_size: 100 })
            });
            const notionData = await notionRes.json();
            const existingTitles = (notionData.results || [])
              .map(p => p.properties?.Name?.title?.[0]?.plain_text || '')
              .filter(Boolean)
              .map(t => t.toLowerCase());

            // Find next unwritten brief from calendar
            let brief = null;
            for (const item of calendar) {
              const titleLower = item.title_suggestion.toLowerCase();
              const alreadyExists = existingTitles.some(t =>
                t.includes(item.keyword) || t === titleLower || titleLower.includes(t)
              );
              if (!alreadyExists) {
                brief = item;
                break;
              }
            }

            if (!brief) {
              console.log('All calendar briefs have been written. Add more to content-calendar.json.');
              return;
            }

            // Build the prompt with the specific brief
            const prompt = `You are writing a blog post for APodcastGeek (apodcastgeek.com), Ireland's award-winning B2B podcast production agency based in Dublin. The agency offers done-for-you podcast production under "The APG Brand Builder" service.

BRIEF:
${brief.brief}

ORIGINAL DATA POINTS TO INCLUDE:
${brief.data_points.map(d => '- ' + d).join('\n')}

INTERNAL PAGES TO LINK TO:
${brief.internal_links.map(l => '- https://apodcastgeek.com' + l).join('\n')}

${brief.embed_videos.length > 0 ? 'EMBED THESE WISTIA VIDEOS (use this exact HTML):\n' + brief.embed_videos.map(id => `<div style="margin:2rem 0"><div class="wistia_embed wistia_async_${id} videoFoam=true" style="width:100%;max-width:640px;aspect-ratio:16/9;margin:0 auto"></div></div>`).join('\n') : ''}

WRITING RULES:
- No em dashes ever
- No exclamation marks
- No filler words or fluff
- Direct, authoritative, professional tone
- Write from "we" perspective as APodcastGeek
- Use data and specifics, not vague claims
- Every section should be actionable
- Include external links to authoritative sources (HBR, Forbes, industry reports) where relevant
- End with a CTA to book a strategy call at https://calendly.com/apodcastgeek_dave/apg-podcast-accelerator-discovery-call

FORMAT YOUR RESPONSE EXACTLY AS:
TITLE: [title]
SLUG: [slug]
DESCRIPTION: [meta description, 150-160 characters]
TAG: [${brief.tag}]
---
[full article content in HTML using h2, h3, p, ul, li, blockquote, a tags. Do NOT include h1. Include the Wistia embed HTML where contextually relevant. Include internal links as <a href="url">anchor text</a>.]`;

            // Generate with Claude
            const claudeRes = await fetch('https://api.anthropic.com/v1/messages', {
              method: 'POST',
              headers: {
                'x-api-key': process.env.ANTHROPIC_API_KEY,
                'anthropic-version': '2023-06-01',
                'content-type': 'application/json'
              },
              body: JSON.stringify({
                model: 'claude-sonnet-4-6-20250514',
                max_tokens: 4000,
                messages: [{ role: 'user', content: prompt }]
              })
            });
            const claudeData = await claudeRes.json();
            const response = claudeData.content[0].text;

            // Parse response
            const titleMatch = response.match(/TITLE:\s*(.+)/);
            const slugMatch = response.match(/SLUG:\s*(.+)/);
            const descMatch = response.match(/DESCRIPTION:\s*(.+)/);
            const tagMatch = response.match(/TAG:\s*(.+)/);
            const contentParts = response.split('---\n');
            const content = contentParts.length > 1 ? contentParts.slice(1).join('---\n').trim() : '';

            if (!titleMatch || !slugMatch || !content) {
              core.setFailed('Failed to parse AI response');
              return;
            }

            const title = titleMatch[1].trim();
            const slug = slugMatch[1].trim();
            const description = descMatch ? descMatch[1].trim() : '';
            const tag = tagMatch ? tagMatch[1].trim() : brief.tag;
            const today = new Date().toISOString().split('T')[0];

            // Create Notion page with content in blocks
            // Split content into chunks for Notion's 2000 char block limit
            const chunks = [];
            let remaining = content;
            while (remaining.length > 0) {
              chunks.push(remaining.substring(0, 1900));
              remaining = remaining.substring(1900);
            }

            const children = chunks.map(chunk => ({
              object: 'block',
              type: 'paragraph',
              paragraph: { rich_text: [{ type: 'text', text: { content: chunk } }] }
            }));

            const createRes = await fetch('https://api.notion.com/v1/pages', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${process.env.NOTION_API_KEY}`,
                'Notion-Version': '2022-06-28',
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                parent: { database_id: process.env.NOTION_DB_ID },
                properties: {
                  Name: { title: [{ text: { content: title } }] },
                  Slug: { rich_text: [{ text: { content: slug } }] },
                  Description: { rich_text: [{ text: { content: description } }] },
                  Tag: { rich_text: [{ text: { content: tag } }] },
                  Status: { select: { name: 'Draft' } },
                  Author: { select: { name: 'APodcastGeek' } },
                  'Publish Date': { rich_text: [{ text: { content: today } }] }
                },
                children: children
              })
            });

            if (createRes.ok) {
              console.log(`Draft created: ${title} (Week ${brief.week}, keyword: ${brief.keyword})`);
            } else {
              const err = await createRes.json();
              core.setFailed(`Notion error: ${JSON.stringify(err)}`);
            }
